server.port=8080

# REST Countries API base URL (v3.1 - actively maintained)
restcountries.base-url=https://restcountries.com/v3.1

# WebClient connection/read timeouts (ms)
webclient.connect-timeout=5000
webclient.read-timeout=10000

# Actuator - expose health and info
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
info.app.name=Country Service
info.app.version=1.0.0
